<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Saucy Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #F5F3EE; color: #1C1C1A; padding: 28px 32px 40px; }
#header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #1C1C1A; }
#header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: #1C1C1A; }
.brand { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #7A7870; margin-bottom: 4px; }
.meeting-date { font-size: 11px; color: #7A7870; text-align: right; line-height: 1.8; }
#chart-card { background: #FFFFFF; border-radius: 14px; border: 1px solid rgba(28,28,26,0.1); padding: 22px 24px 18px; }
#status-msg { text-align: center; padding: 32px; font-size: 13px; color: #7A7870; }
#month-row { display: flex; margin-left: 148px; margin-bottom: 8px; }
.month-cell { flex: 1; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #B4B2A9; }
.section-label { margin: 14px 0 4px 148px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #B4B2A9; }
.swim-row { display: flex; align-items: center; height: 48px; }
.sku-label { width: 148px; flex-shrink: 0; padding-right: 14px; text-align: right; }
.sku-name { font-size: 12px; font-weight: 600; color: #1C1C1A; display: block; line-height: 1.3; }
.sku-stage-tag { font-size: 10px; display: block; margin-top: 1px; }
.track { flex: 1; position: relative; height: 48px; border-left: 1px solid rgba(28,28,26,0.08); }
.grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(28,28,26,0.07); pointer-events: none; }
.bar { position: absolute; top: 50%; transform: translateY(-50%); height: 24px; border-radius: 4px; display: flex; align-items: center; padding: 0 7px; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #E24B4A; z-index: 5; }
.today-tag { position: absolute; top: 3px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 700; color: #E24B4A; white-space: nowrap; }
.pin { position: absolute; top: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 4; }
.pin-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid #FFFFFF; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.2); }
.pin-label { font-size: 9px; text-align: center; padding: 2px 4px; border-radius: 3px; background: #FFFFFF; border: 1px solid rgba(28,28,26,0.15); color: #7A7870; white-space: nowrap; line-height: 1.3; }
.row-divider { height: 1px; background: rgba(28,28,26,0.07); margin: 0 0 0 148px; }
#legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(28,28,26,0.08); margin-left: 148px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #7A7870; font-weight: 500; }
.leg-bar { width: 16px; height: 9px; border-radius: 3px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.2); }
.leg-today-line { width: 2px; height: 13px; background: #E24B4A; border-radius: 1px; }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="brand">Get Saucy</div>
    <h1>R&amp;D &rarr; Commercialization Pipeline</h1>
  </div>
  <div class="meeting-date" id="meeting-date"></div>
</div>

<div id="chart-card">
  <div id="status-msg">Loading pipeline data...</div>
  <div id="month-row" style="display:none"></div>
  <div id="chart"></div>
  <div id="legend" style="display:none">
    <div class="leg"><div class="leg-bar" style="background:#EEEDFB;border:1px solid #AFA9EC"></div>Idea</div>
    <div class="leg"><div class="leg-bar" style="background:#FAEEDA;border:1px solid #EF9F27"></div>R&amp;D bench</div>
    <div class="leg"><div class="leg-bar" style="background:#EEEDFE;border:1px solid #7F77DD"></div>Sensory eval</div>
    <div class="leg"><div class="leg-bar" style="background:#E1F5EE;border:1px solid #1D9E75"></div>Production</div>
    <div class="leg"><div class="leg-bar" style="background:#1C1C1A"></div>Released</div>
    <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>FK prod date</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Stello prod date</div>
    <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>WC prod date</div>
    <div class="leg"><div class="leg-today-line"></div>Today</div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQhrMIUpnocprcZ3MBCkioHtOUpM0Y1BIe5SzSsu1AMHLSW8fSa_VHtJNh8RXfaGkt/exec";
var VIEW_START = "2026-01-01";
var VIEW_END   = "2027-05-01";
var vS = new Date(VIEW_START), vE = new Date(VIEW_END), vSp = vE - vS, now = new Date();

document.getElementById("meeting-date").innerHTML =
  now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}) + "<br>Weekly Ops Meeting";

function pct(d) {
  if (!d) return null;
  var dt = new Date(d); if (isNaN(dt)) return null;
  return Math.max(0,Math.min(100,(dt-vS)/vSp*100)).toFixed(3);
}
function fmtD(d) {
  if (!d) return "";
  var dt = new Date(d); if (isNaN(dt)) return "";
  return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function addDays(d,n) { return new Date(new Date(d).getTime()+n*86400000).toISOString().slice(0,10); }

var STAGE_ORDER   = ["Released","Production","Sensory Eval","R&D bench","Idea / Concept"];
var STAGE_SECTION = {"Released":"Released for sale","Production":"In production","Sensory Eval":"Sensory evaluation","R&D bench":"R&D bench","Idea / Concept":"Idea stage"};
var STAGE_COLOR   = {"Released":"#1C1C1A","Production":"#1D9E75","Sensory Eval":"#5B52C9","R&D bench":"#D4860A","Idea / Concept":"#6C63D9"};

function buildChart(skus) {
  document.getElementById("status-msg").style.display = "none";
  document.getElementById("month-row").style.display  = "flex";
  document.getElementById("legend").style.display     = "flex";

  var mRow = document.getElementById("month-row"), months = [];
  var mc = new Date(vS.getFullYear(),vS.getMonth(),1);
  while (mc < vE) {
    months.push(new Date(mc));
    var el = document.createElement("div"); el.className = "month-cell";
    el.textContent = mc.toLocaleDateString("en-US",{month:"short",year:"2-digit"});
    mRow.appendChild(el);
    mc = new Date(mc.getFullYear(),mc.getMonth()+1,1);
  }

  var chart = document.getElementById("chart"), lastStage = null;
  var sorted = skus.slice().sort(function(a,b){ return STAGE_ORDER.indexOf(a.stage)-STAGE_ORDER.indexOf(b.stage); });

  sorted.forEach(function(sku,i) {
    if (!sku.name) return;
    if (sku.stage !== lastStage) {
      lastStage = sku.stage;
      var sl = document.createElement("div"); sl.className = "section-label";
      sl.textContent = STAGE_SECTION[sku.stage]||sku.stage; chart.appendChild(sl);
    }

    var row = document.createElement("div"); row.className = "swim-row";
    var lbl = document.createElement("div"); lbl.className = "sku-label";
    lbl.innerHTML = '<span class="sku-name">'+sku.name+'</span><span class="sku-stage-tag" style="color:'+(STAGE_COLOR[sku.stage]||"#7A7870")+'">'+sku.stage+'</span>';
    row.appendChild(lbl);

    var track = document.createElement("div"); track.className = "track";

    months.forEach(function(m) {
      var pv = pct(m.toISOString().slice(0,10));
      if (!pv||parseFloat(pv)<=0||parseFloat(pv)>=100) return;
      var gl = document.createElement("div"); gl.className="grid-line"; gl.style.left=pv+"%"; track.appendChild(gl);
    });

    var tp = pct(now.toISOString().slice(0,10));
    if (tp&&parseFloat(tp)>0&&parseFloat(tp)<100) {
      var tl=document.createElement("div"); tl.className="today-line"; tl.style.left=tp+"%";
      var tt=document.createElement("div"); tt.className="today-tag"; tt.textContent="today";
      tl.appendChild(tt); track.appendChild(tl);
    }

    function addBar(s,e,bg,bdr,color,label) {
      var l=pct(s); if (!l) return;
      var w=parseFloat(pct(e))-parseFloat(l); if (w<=0) return;
      var b=document.createElement("div"); b.className="bar";
      b.style.cssText="left:"+l+"%;width:"+Math.max(w,0.5)+"%;background:"+bg+";border:1px solid "+bdr+";color:"+color;
      if (w>2.5) b.textContent=label; track.appendChild(b);
    }
    function addPin(d,color,label) {
      if (!d) return; var pv=pct(d); if (!pv) return;
      var pin=document.createElement("div"); pin.className="pin"; pin.style.left=pv+"%";
      var dot=document.createElement("div"); dot.className="pin-dot"; dot.style.background=color;
      var pl=document.createElement("div"); pl.className="pin-label";
      pl.innerHTML='<span style="color:'+color+';font-size:8px;font-weight:700;display:block">'+label+'</span>'+fmtD(d);
      pin.appendChild(dot); pin.appendChild(pl); track.appendChild(pin);
    }

    addBar(sku.idea, sku.rd||addDays(sku.idea,21), "#EEEDFB","#AFA9EC","#6C63D9","Idea");
    if (sku.rd) addBar(sku.rd, sku.sensory||addDays(sku.rd,45), "#FAEEDA","#EF9F27","#D4860A","R&D bench");
    if (sku.sensory) {
      var sc=sku.fk?new Date(Math.min(new Date(sku.fk).getTime(),new Date(addDays(sku.sensory,18)).getTime())).toISOString().slice(0,10):addDays(sku.sensory,14);
      addBar(sku.sensory,sc,"#EEEDFE","#7F77DD","#5B52C9","Sensory"+(sku.outcome?" \u00b7 "+sku.outcome:""));
    }
    if (sku.fk) {
      var ir=sku.stage==="Released";
      addBar(sku.fk,addDays(sku.fk,30),ir?"#1C1C1A":"#E1F5EE",ir?"#1C1C1A":"#1D9E75",ir?"#FFFFFF":"#085041",ir?"Released":"Production");
      addPin(sku.fk,"#378ADD","FK");
      addPin(sku.stello,"#1D9E75","Stello");
      addPin(sku.wc,"#7F77DD","WC");
    }

    row.appendChild(track); chart.appendChild(row);
    var next=sorted[i+1];
    if (next&&next.stage===sku.stage) {
      var dv=document.createElement("div"); dv.className="row-divider"; chart.appendChild(dv);
    }
  });
}

var FALLBACK = [
  {name:"Marinada",    stage:"Released",    idea:"2024-10-01",rd:"2024-10-01",sensory:"2024-12-13",outcome:"Approved",fk:"2025-02-22",stello:null,wc:null},
  {name:"Tikka Masala",stage:"Production",  idea:"2024-11-01",rd:"2024-11-01",sensory:"2025-02-09",outcome:"Approved",fk:"2025-03-24",stello:null,wc:null},
  {name:"Salsa Verde", stage:"Production",  idea:"2024-11-15",rd:"2024-11-15",sensory:"2025-02-19",outcome:"Approved",fk:"2025-05-02",stello:null,wc:null},
  {name:"BBQ",         stage:"Sensory Eval",idea:"2024-12-01",rd:"2024-12-01",sensory:"2025-03-04",outcome:"Approved",fk:"2025-04-30",stello:null,wc:null},
  {name:"Orange",      stage:"Sensory Eval",idea:"2025-01-15",rd:"2025-01-15",sensory:"2025-03-18",outcome:"Pending", fk:"2025-04-27",stello:null,wc:null},
  {name:"Yellow Thai", stage:"Sensory Eval",idea:"2025-02-01",rd:"2025-02-01",sensory:"2025-04-01",outcome:"Pending", fk:"2025-05-13",stello:null,wc:null},
  {name:"Mac & Cheese",stage:"R&D bench",   idea:"2025-04-01",rd:"2025-04-01",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Pesto",       stage:"R&D bench",   idea:"2025-04-15",rd:"2025-04-15",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Nomato Cream",stage:"R&D bench",   idea:"2025-05-01",rd:"2025-05-01",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Ketchup",     stage:"R&D bench",   idea:"2025-05-01",rd:"2025-05-01",sensory:null,outcome:"",fk:null,stello:null,wc:null}
];

function useFallback() { buildChart(FALLBACK); }

window.handleData = function(data) {
  if (data && data.length) buildChart(data);
  else useFallback();
};

setTimeout(function() {
  if (document.getElementById("status-msg").style.display !== "none") useFallback();
}, 5000);

var s = document.createElement("script");
s.src = SCRIPT_URL + "?callback=handleData";
s.onerror = useFallback;
document.head.appendChild(s);
</script>
</body>
</html>
