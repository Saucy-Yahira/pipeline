<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Saucy Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #F5F3EE; color: #1C1C1A; padding: 28px 32px 40px; }
#header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #1C1C1A; }
#header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: #1C1C1A; }
.brand { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #7A7870; margin-bottom: 4px; }
.meeting-date { font-size: 11px; color: #7A7870; text-align: right; line-height: 1.8; }
#filters { margin-bottom: 20px; }
#search-box { width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid rgba(28,28,26,0.2); border-radius: 8px; margin-bottom: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; outline: none; }
#search-box:focus { border-color: rgba(28,28,26,0.5); }
.filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.filter-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #B4B2A9; min-width: 60px; }
.filter-btn { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(28,28,26,0.2); background: #fff; color: #7A7870; cursor: pointer; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
.filter-btn:hover { border-color: rgba(28,28,26,0.4); color: #1C1C1A; }
.filter-btn.active { background: #1C1C1A; color: #fff; border-color: #1C1C1A; }
.filter-btn.active.fk { background: #ff6d01; border-color: #ff6d01; }
.filter-btn.active.stello { background: #1D9E75; border-color: #1D9E75; }
.filter-btn.active.wc { background: #ff00d9; border-color: #ff00d9; }
#chart-card { background: #FFFFFF; border-radius: 14px; border: 1px solid rgba(28,28,26,0.1); padding: 22px 24px 18px; }
#status-msg { text-align: center; padding: 32px; font-size: 13px; color: #7A7870; }
.no-results { text-align: center; padding: 32px; font-size: 13px; color: #B4B2A9; display: none; }
#month-row { display: flex; margin-left: 148px; margin-bottom: 8px; }
.month-cell { flex: 1; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #B4B2A9; }
.section-label { margin: 14px 0 4px 148px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #B4B2A9; }
.swim-row { display: flex; align-items: center; height: 48px; }
.sku-label { width: 148px; flex-shrink: 0; padding-right: 14px; text-align: right; }
.sku-name { font-size: 12px; font-weight: 600; color: #1C1C1A; display: block; line-height: 1.3; }
.sku-stage-tag { font-size: 10px; display: block; margin-top: 1px; }
.track { flex: 1; position: relative; height: 48px; border-left: 1px solid rgba(28,28,26,0.08); }
.grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(28,28,26,0.07); pointer-events: none; }
.bar { position: absolute; top: 50%; transform: translateY(-50%); height: 24px; border-radius: 4px; display: flex; align-items: center; padding: 0 7px; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #E24B4A; z-index: 5; }
.today-tag { position: absolute; top: 3px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 700; color: #E24B4A; white-space: nowrap; }
.pin { position: absolute; top: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 4; }
.pin-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid #FFFFFF; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.2); }
.pin-dot-tent { width: 11px; height: 11px; border-radius: 50%; background: #FFFFFF; border: 2px dashed; }
.pin-label { font-size: 9px; text-align: center; padding: 2px 4px; border-radius: 3px; background: #FFFFFF; border: 1px solid rgba(28,28,26,0.15); color: #7A7870; white-space: nowrap; line-height: 1.3; }
.pin-label-tent { font-size: 9px; text-align: center; padding: 2px 4px; border-radius: 3px; background: #FFFFFF; border: 1px dashed rgba(28,28,26,0.3); color: #B4B2A9; white-space: nowrap; line-height: 1.3; font-style: italic; }
.row-divider { height: 1px; background: rgba(28,28,26,0.07); margin: 0 0 0 148px; }
#legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(28,28,26,0.08); margin-left: 148px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #7A7870; font-weight: 500; }
.leg-bar { width: 16px; height: 9px; border-radius: 3px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.2); }
.leg-dot-tent { width: 10px; height: 10px; border-radius: 50%; background: white; border: 2px dashed; }
.leg-today-line { width: 2px; height: 13px; background: #E24B4A; border-radius: 1px; }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="brand">Get Saucy</div>
    <h1>R&amp;D &rarr; Commercialization Pipeline</h1>
  </div>
  <div class="meeting-date" id="meeting-date"></div>
</div>

<div id="filters">
  <input type="text" id="search-box" placeholder="Search by SKU name..." oninput="applyFilters()" />
  <div class="filter-row">
    <span class="filter-label">Stage</span>
    <button class="filter-btn active" data-stage="all" onclick="setStage(this)">All</button>
    <button class="filter-btn" data-stage="Released" onclick="setStage(this)">Released</button>
    <button class="filter-btn" data-stage="Production" onclick="setStage(this)">Production</button>
    <button class="filter-btn" data-stage="Sensory Eval" onclick="setStage(this)">Sensory Eval</button>
    <button class="filter-btn" data-stage="R&D Production" onclick="setStage(this)">R&amp;D Production</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Co-man</span>
    <button class="filter-btn active" data-coman="all" onclick="setComan(this)">All</button>
    <button class="filter-btn fk" data-coman="fk" onclick="setComan(this)">FK</button>
    <button class="filter-btn stello" data-coman="stello" onclick="setComan(this)">Stello</button>
    <button class="filter-btn wc" data-coman="wc" onclick="setComan(this)">WC</button>
  </div>
</div>

<div id="chart-card">
  <div id="status-msg">Loading pipeline data...</div>
  <div class="no-results" id="no-results">No SKUs match your filters.</div>
  <div id="month-row" style="display:none"></div>
  <div id="chart"></div>
  <div id="legend" style="display:none">
    <div class="leg"><div class="leg-bar" style="background:#EEEDFB;border:1px solid #AFA9EC"></div>Idea</div>
    <div class="leg"><div class="leg-bar" style="background:#FAEEDA;border:1px solid #EF9F27"></div>R&amp;D Production</div>
    <div class="leg"><div class="leg-bar" style="background:#EEEDFE;border:1px solid #7F77DD"></div>Sensory eval</div>
    <div class="leg"><div class="leg-bar" style="background:#E1F5EE;border:1px solid #1D9E75"></div>Production</div>
    <div class="leg"><div class="leg-bar" style="background:#1C1C1A"></div>Released</div>
    <div class="leg"><div class="leg-dot" style="background:#ff6d01"></div>FK confirmed</div>
    <div class="leg"><div class="leg-dot-tent" style="border-color:#ff6d01"></div>FK tentative</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Stello confirmed</div>
    <div class="leg"><div class="leg-dot-tent" style="border-color:#1D9E75"></div>Stello tentative</div>
    <div class="leg"><div class="leg-dot" style="background:#ff00d9"></div>WC confirmed</div>
    <div class="leg"><div class="leg-dot-tent" style="border-color:#ff00d9"></div>WC tentative</div>
    <div class="leg"><div class="leg-today-line"></div>Today</div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoXIKULDgmIzmKQGSJrf2e4Q9r0iZJzr8kC5Tl6FzhBb0X7is5snfk98gwPEYCVYWX/exec";
var VIEW_START = "2026-01-01";
var VIEW_END   = "2027-05-01";

var vS  = new Date("2026-01-01T00:00:00");
var vE  = new Date("2027-05-01T00:00:00");
var vSp = vE - vS;
var now = new Date();

document.getElementById("meeting-date").innerHTML =
  now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}) + "<br>Weekly Ops Meeting";

function pct(dateStr) {
  if (!dateStr) return null;
  var parts = dateStr.split("-");
  if (parts.length !== 3) return null;
  var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  if (isNaN(dt)) return null;
  var v = (dt - vS) / vSp * 100;
  return Math.max(0, Math.min(100, v)).toFixed(3);
}

function fmtD(dateStr) {
  if (!dateStr) return "";
  var parts = dateStr.split("-");
  if (parts.length !== 3) return "";
  var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  if (isNaN(dt)) return "";
  return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function addDays(dateStr, n) {
  var parts = dateStr.split("-");
  var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  dt.setDate(dt.getDate() + n);
  var y = dt.getFullYear();
  var m = String(dt.getMonth()+1).padStart(2,"0");
  var d = String(dt.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}

function minDate(a, b) {
  if (!a) return b; if (!b) return a;
  return a < b ? a : b;
}

var STAGE_ORDER   = ["Released","Production","Sensory Eval","R&D Production","Idea / Concept"];
var STAGE_SECTION = {"Released":"Released for sale","Production":"In production","Sensory Eval":"Sensory evaluation","R&D Production":"R&D Production","Idea / Concept":"Idea stage"};
var STAGE_COLOR   = {"Released":"#1C1C1A","Production":"#1D9E75","Sensory Eval":"#5B52C9","R&D Production":"#D4860A","Idea / Concept":"#6C63D9"};
var allSkuData = [];
var activeStage = "all", activeComan = "all";

function setStage(btn) {
  document.querySelectorAll("[data-stage]").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active"); activeStage = btn.getAttribute("data-stage"); applyFilters();
}
function setComan(btn) {
  document.querySelectorAll("[data-coman]").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active"); activeComan = btn.getAttribute("data-coman"); applyFilters();
}
function applyFilters() {
  var search = document.getElementById("search-box").value.toLowerCase().trim();
  var swimRows = document.querySelectorAll(".swim-row");
  var visibleCount = 0;
  swimRows.forEach(function(row,i) {
    var sku = allSkuData[i]; if (!sku) return;
    var matchSearch = !search || sku.name.toLowerCase().indexOf(search) !== -1;
    var matchStage  = activeStage === "all" || sku.stage === activeStage;
    var matchComan  = activeComan === "all" ||
      (activeComan === "fk"     && (sku.fk || sku.fkTent)) ||
      (activeComan === "stello" && (sku.stello || sku.stelloTent)) ||
      (activeComan === "wc"     && (sku.wc || sku.wcTent));
    if (matchSearch && matchStage && matchComan) { row.style.display = ""; visibleCount++; }
    else { row.style.display = "none"; }
  });
  document.querySelectorAll(".section-label").forEach(function(label) {
    var next = label.nextElementSibling, hasVisible = false;
    while (next && !next.classList.contains("section-label")) {
      if (next.classList.contains("swim-row") && next.style.display !== "none") hasVisible = true;
      next = next.nextElementSibling;
    }
    label.style.display = hasVisible ? "" : "none";
  });
  document.querySelectorAll(".row-divider").forEach(function(div) {
    var prev = div.previousElementSibling, next = div.nextElementSibling;
    if ((prev && prev.style.display === "none") || (next && next.style.display === "none")) div.style.display = "none";
    else div.style.display = "";
  });
  document.getElementById("no-results").style.display = visibleCount === 0 ? "block" : "none";
}

function buildChart(skus) {
  document.getElementById("status-msg").style.display = "none";
  document.getElementById("month-row").style.display  = "flex";
  document.getElementById("legend").style.display     = "flex";

  var mRow = document.getElementById("month-row"), months = [];
  var mc = new Date(vS.getFullYear(), vS.getMonth(), 1);
  while (mc < vE) {
    months.push(new Date(mc));
    var el = document.createElement("div"); el.className = "month-cell";
    el.textContent = mc.toLocaleDateString("en-US",{month:"short",year:"2-digit"});
    mRow.appendChild(el);
    mc = new Date(mc.getFullYear(), mc.getMonth()+1, 1);
  }

  var chart = document.getElementById("chart"), lastStage = null;
  allSkuData = skus.slice().sort(function(a,b){
    return STAGE_ORDER.indexOf(a.stage) - STAGE_ORDER.indexOf(b.stage);
  });

  allSkuData.forEach(function(sku, i) {
    if (!sku.name) return;

    if (sku.stage !== lastStage) {
      lastStage = sku.stage;
      var sl = document.createElement("div"); sl.className = "section-label";
      sl.textContent = STAGE_SECTION[sku.stage]||sku.stage; chart.appendChild(sl);
    }

    var row = document.createElement("div"); row.className = "swim-row";
    var lbl = document.createElement("div"); lbl.className = "sku-label";
    lbl.innerHTML = '<span class="sku-name">'+sku.name+'</span><span class="sku-stage-tag" style="color:'+(STAGE_COLOR[sku.stage]||"#7A7870")+'">'+sku.stage+'</span>';
    row.appendChild(lbl);

    var track = document.createElement("div"); track.className = "track";

    months.forEach(function(m) {
      var y = m.getFullYear(), mo = String(m.getMonth()+1).padStart(2,"0");
      var pv = pct(y+"-"+mo+"-01");
      if (!pv || parseFloat(pv) <= 0 || parseFloat(pv) >= 100) return;
      var gl = document.createElement("div"); gl.className = "grid-line"; gl.style.left = pv+"%";
      track.appendChild(gl);
    });

    var td = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
    var tp = pct(td);
    if (tp && parseFloat(tp) > 0 && parseFloat(tp) < 100) {
      var tl = document.createElement("div"); tl.className = "today-line"; tl.style.left = tp+"%";
      var tt = document.createElement("div"); tt.className = "today-tag"; tt.textContent = "today";
      tl.appendChild(tt); track.appendChild(tl);
    }

    function addBar(s, e, bg, bdr, color, label) {
      if (!s) return;
      var l = pct(s); if (l === null) return;
      var r = pct(e); if (r === null) return;
      var w = parseFloat(r) - parseFloat(l);
      if (w <= 0) return;
      var b = document.createElement("div"); b.className = "bar";
      b.style.left = l+"%"; b.style.width = Math.max(w, 0.5)+"%";
      b.style.background = bg; b.style.border = "1px solid "+bdr; b.style.color = color;
      if (w > 2.5) b.textContent = label;
      track.appendChild(b);
    }

    function addPin(d, color, label) {
      if (!d) return;
      var pv = pct(d); if (pv === null) return;
      var pin = document.createElement("div"); pin.className = "pin"; pin.style.left = pv+"%";
      var dot = document.createElement("div"); dot.className = "pin-dot"; dot.style.background = color;
      var pl = document.createElement("div"); pl.className = "pin-label";
      pl.innerHTML = '<span style="color:'+color+';font-size:8px;font-weight:700;display:block">'+label+'</span>'+fmtD(d);
      pin.appendChild(dot); pin.appendChild(pl); track.appendChild(pin);
    }

    function addTentPin(d, color, label) {
      if (!d) return;
      var pv = pct(d); if (pv === null) return;
      var pin = document.createElement("div"); pin.className = "pin"; pin.style.left = pv+"%";
      var dot = document.createElement("div"); dot.className = "pin-dot-tent"; dot.style.borderColor = color;
      var pl = document.createElement("div"); pl.className = "pin-label-tent";
      pl.innerHTML = '<span style="color:'+color+';font-size:8px;font-weight:700;display:block">'+label+'</span>'+fmtD(d);
      pin.appendChild(dot); pin.appendChild(pl); track.appendChild(pin);
    }

    // Draw bars only when dates exist
    if (sku.idea) addBar(sku.idea, sku.rd || addDays(sku.idea,21), "#EEEDFB","#AFA9EC","#6C63D9","Idea");
    if (sku.rd)   addBar(sku.rd, sku.sensory || addDays(sku.rd,45), "#FAEEDA","#EF9F27","#D4860A","R&D Production");
    if (sku.sensory) {
      var senEnd = sku.fk ? minDate(sku.fk, addDays(sku.sensory,18)) : addDays(sku.sensory,14);
      addBar(sku.sensory, senEnd, "#EEEDFE","#7F77DD","#5B52C9","Sensory"+(sku.outcome?" \u00b7 "+sku.outcome:""));
    }
    if (sku.fk) {
      var isRel = sku.stage === "Released";
      addBar(sku.fk, addDays(sku.fk,30), isRel?"#1C1C1A":"#E1F5EE", isRel?"#1C1C1A":"#1D9E75", isRel?"#FFFFFF":"#085041", isRel?"Released":"Production");
    }

    addPin(sku.fk,         "#ff6d01", "FK");
    addTentPin(sku.fkTent, "#ff6d01", "FK?");
    addPin(sku.stello,         "#1D9E75", "Stello");
    addTentPin(sku.stelloTent, "#1D9E75", "Stello?");
    addPin(sku.wc,         "#ff00d9", "WC");
    addTentPin(sku.wcTent, "#ff00d9", "WC?");

    row.appendChild(track);
    chart.appendChild(row);

    var next = allSkuData[i+1];
    if (next && next.stage === sku.stage) {
      var dv = document.createElement("div"); dv.className = "row-divider"; chart.appendChild(dv);
    }
  });
}

function useFallback() { buildChart([]); }

window.handleData = function(data) {
  if (data && data.length) buildChart(data);
  else useFallback();
};

setTimeout(function() {
  if (document.getElementById("status-msg").style.display !== "none") useFallback();
}, 5000);

var s = document.createElement("script");
s.src = SCRIPT_URL + "?callback=handleData";
s.onerror = useFallback;
document.head.appendChild(s);
</script>
</body>
</html>
