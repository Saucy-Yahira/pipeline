</head>
<body>

<div id="header">
  <div>
    <div class="brand">Get Saucy</div>
    <h1>R&amp;D &rarr; Commercialization Pipeline</h1>
  </div>
  <div class="meeting-date" id="meeting-date"></div>
</div>

<div id="chart-card">
  <div id="status-msg">Loading pipeline data from Google Sheets...</div>
  <div id="month-row" style="display:none"></div>
  <div id="chart"></div>
  <div id="legend" style="display:none">
    <div class="leg"><div class="leg-bar" style="background:#EEEDFB;border:1px solid #AFA9EC"></div>Idea</div>
    <div class="leg"><div class="leg-bar" style="background:#FAEEDA;border:1px solid #EF9F27"></div>R&amp;D bench</div>
    <div class="leg"><div class="leg-bar" style="background:#EEEDFE;border:1px solid #7F77DD"></div>Sensory eval</div>
    <div class="leg"><div class="leg-bar" style="background:#E1F5EE;border:1px solid #1D9E75"></div>Production</div>
    <div class="leg"><div class="leg-bar" style="background:#1C1C1A"></div>Released</div>
    <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>FK prod date</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Stello prod date</div>
    <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>WC prod date</div>
    <div class="leg"><div class="leg-today-line"></div>Today</div>
  </div>
</div>

<script>
var SHEET_ID = "1QSHhrQf48uwO9sIPzKLilJcu_tN1UvbN1Pf3NTemibg";
var SHEET_TAB = "Pipeline";
var VIEW_START = "2024-09-01";
var VIEW_END   = "2026-06-01";

var vS  = new Date(VIEW_START);
var vE  = new Date(VIEW_END);
var vSp = vE - vS;
var now = new Date();

document.getElementById("meeting-date").innerHTML =
  now.toLocaleDateString("en-US", {weekday:"long", month:"long", day:"numeric", year:"numeric"}) +
  "<br>Weekly Ops Meeting";

function pct(d) {
  if (!d) return null;
  var dt = new Date(d);
  if (isNaN(dt)) return null;
  return Math.max(0, Math.min(100, (dt - vS) / vSp * 100)).toFixed(3);
}
function fmtD(d) {
  if (!d) return "";
  var dt = new Date(d);
  if (isNaN(dt)) return "";
  return dt.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}
function addDays(d, n) {
  return new Date(new Date(d).getTime() + n * 86400000).toISOString().slice(0,10);
}

var STAGE_ORDER   = ["Released","Production","Sensory Eval","R&D bench","Idea / Concept"];
var STAGE_SECTION = {"Released":"Released for sale","Production":"In production","Sensory Eval":"Sensory evaluation","R&D bench":"R&D bench","Idea / Concept":"Idea stage"};
var STAGE_COLOR   = {"Released":"#1C1C1A","Production":"#1D9E75","Sensory Eval":"#5B52C9","R&D bench":"#D4860A","Idea / Concept":"#6C63D9"};

function parseCSV(text) {
  var rows = [], row = [], cur = "", inQ = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ""; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      row.push(cur.trim()); rows.push(row); row = []; cur = "";
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else cur += ch;
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

function buildChart(skus) {
  document.getElementById("status-msg").style.display = "none";
  document.getElementById("month-row").style.display  = "flex";
  document.getElementById("legend").style.display     = "flex";

  var mRow = document.getElementById("month-row");
  var months = [];
  var mc = new Date(vS.getFullYear(), vS.getMonth(), 1);
  while (mc < vE) {
    months.push(new Date(mc));
    var el = document.createElement("div");
    el.className = "month-cell";
    el.textContent = mc.toLocaleDateString("en-US", {month:"short", year:"2-digit"});
    mRow.appendChild(el);
    mc = new Date(mc.getFullYear(), mc.getMonth() + 1, 1);
  }

  var chart = document.getElementById("chart");
  var lastStage = null;

  var sorted = skus.slice().sort(function(a,b) {
    return STAGE_ORDER.indexOf(a.stage) - STAGE_ORDER.indexOf(b.stage);
  });

  sorted.forEach(function(sku, i) {
    if (!sku.name) return;

    if (sku.stage !== lastStage) {
      lastStage = sku.stage;
      var sl = document.createElement("div");
      sl.className = "section-label";
      sl.textContent = STAGE_SECTION[sku.stage] || sku.stage;
      chart.appendChild(sl);
    }

    var row = document.createElement("div");
    row.className = "swim-row";

    var lbl = document.createElement("div");
    lbl.className = "sku-label";
    lbl.innerHTML = '<span class="sku-name">' + sku.name + '</span>' +
      '<span class="sku-stage-tag" style="color:' + (STAGE_COLOR[sku.stage]||"#7A7870") + '">' + sku.stage + '</span>';
    row.appendChild(lbl);

    var track = document.createElement("div");
    track.className = "track";

    months.forEach(function(m) {
      var pv = pct(m.toISOString().slice(0,10));
      if (!pv || parseFloat(pv) <= 0 || parseFloat(pv) >= 100) return;
      var gl = document.createElement("div");
      gl.className = "grid-line"; gl.style.left = pv + "%";
      track.appendChild(gl);
    });

    var tp = pct(now.toISOString().slice(0,10));
    if (tp && parseFloat(tp) > 0 && parseFloat(tp) < 100) {
      var tl = document.createElement("div"); tl.className = "today-line"; tl.style.left = tp + "%";
      var tt = document.createElement("div"); tt.className = "today-tag"; tt.textContent = "today";
      tl.appendChild(tt); track.appendChild(tl);
    }

    function addBar(s, e, bg, border, color, label) {
      var l = pct(s); if (!l) return;
      var w = parseFloat(pct(e)) - parseFloat(l); if (w <= 0) return;
      var b = document.createElement("div"); b.className = "bar";
      b.style.cssText = "left:"+l+"%;width:"+Math.max(w,0.5)+"%;background:"+bg+";border:1px solid "+border+";color:"+color;
      if (w > 2.5) b.textContent = label;
      track.appendChild(b);
    }

    function addPin(d, color, label) {
      if (!d) return;
      var pv = pct(d); if (!pv) return;
      var pin = document.createElement("div"); pin.className = "pin"; pin.style.left = pv + "%";
      var dot = document.createElement("div"); dot.className = "pin-dot"; dot.style.background = color;
      var pl = document.createElement("div"); pl.className = "pin-label";
      pl.innerHTML = '<span style="color:'+color+';font-size:8px;font-weight:700;display:block">'+label+'</span>'+fmtD(d);
      pin.appendChild(dot); pin.appendChild(pl); track.appendChild(pin);
    }

    var ideaEnd = sku.rd || addDays(sku.idea, 21);
    addBar(sku.idea, ideaEnd, "#EEEDFB", "#AFA9EC", "#6C63D9", "Idea");

    if (sku.rd) {
      var rdEnd = sku.sensory || addDays(sku.rd, 45);
      addBar(sku.rd, rdEnd, "#FAEEDA", "#EF9F27", "#D4860A", "R&D bench");
    }

    if (sku.sensory) {
      var senCap = sku.fk
        ? new Date(Math.min(new Date(sku.fk).getTime(), new Date(addDays(sku.sensory,18)).getTime())).toISOString().slice(0,10)
        : addDays(sku.sensory, 14);
      addBar(sku.sensory, senCap, "#EEEDFE", "#7F77DD", "#5B52C9", "Sensory" + (sku.outcome ? " \u00b7 "+sku.outcome : ""));
    }

    if (sku.fk) {
      var isRel = sku.stage === "Released";
      addBar(sku.fk, addDays(sku.fk,30),
        isRel?"#1C1C1A":"#E1F5EE", isRel?"#1C1C1A":"#1D9E75", isRel?"#FFFFFF":"#085041",
        isRel?"Released":"Production");
      addPin(sku.fk,    "#378ADD", "FK");
      addPin(sku.stello,"#1D9E75", "Stello");
      addPin(sku.wc,    "#7F77DD", "WC");
    }

    row.appendChild(track);
    chart.appendChild(row);

    var next = sorted[i+1];
    if (next && next.stage === sku.stage) {
      var div = document.createElement("div"); div.className = "row-divider"; chart.appendChild(div);
    }
  });
}

function loadFromSheet() {
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
    "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(SHEET_TAB) + "&range=B5:K30";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var rows = parseCSV(xhr.responseText);
        if (rows.length < 2) throw new Error("no data");
        var h = rows[0].map(function(x){ return x.toLowerCase(); });
        var ci = function(n){ return h.indexOf(n.toLowerCase()); };
        var col = {
          name:   ci("sku name"),
          stage:  ci("current stage"),
          idea:   ci("idea / concept date"),
          rd:     ci("r&d start"),
          sen:    ci("sensory eval date"),
          out:    ci("sensory outcome"),
          fk:     ci("fk prod date"),
          st:     ci("stello prod date"),
          wc:     ci("wc prod date")
        };
        var skus = rows.slice(1).filter(function(r){ return r[col.name] && r[col.name].trim(); }).map(function(r){
          return {
            name:    r[col.name]  || "",
            stage:   r[col.stage] || "",
            idea:    r[col.idea]  || null,
            rd:      r[col.rd]    || null,
            sensory: r[col.sen]   || null,
            outcome: r[col.out]   || "",
            fk:      r[col.fk]    || null,
            stello:  r[col.st]    || null,
            wc:      r[col.wc]    || null
          };
        });
        if (skus.length) { buildChart(skus); return; }
      } catch(e) {}
    }
    useFallback();
  };
  xhr.onerror = function() { useFallback(); };
  xhr.send();
}

function useFallback() {
  document.getElementById("status-msg").textContent = "Showing saved data \u2014 could not reach Google Sheets.";
  document.getElementById("status-msg").style.display = "block";
  setTimeout(function() {
    buildChart(FALLBACK);
    document.getElementById("status-msg").style.display = "none";
  }, 1000);
}

var FALLBACK = [
  {name:"Marinada",    stage:"Released",    idea:"2024-10-01",rd:"2024-10-01",sensory:"2024-12-13",outcome:"Approved",fk:"2025-02-22",stello:null,wc:null},
  {name:"Tikka Masala",stage:"Production",  idea:"2024-11-01",rd:"2024-11-01",sensory:"2025-02-09",outcome:"Approved",fk:"2025-03-24",stello:null,wc:null},
  {name:"Salsa Verde", stage:"Production",  idea:"2024-11-15",rd:"2024-11-15",sensory:"2025-02-19",outcome:"Approved",fk:"2025-05-02",stello:null,wc:null},
  {name:"BBQ",         stage:"Sensory Eval",idea:"2024-12-01",rd:"2024-12-01",sensory:"2025-03-04",outcome:"Approved",fk:"2025-04-30",stello:null,wc:null},
  {name:"Orange",      stage:"Sensory Eval",idea:"2025-01-15",rd:"2025-01-15",sensory:"2025-03-18",outcome:"Pending", fk:"2025-04-27",stello:null,wc:null},
  {name:"Yellow Thai", stage:"Sensory Eval",idea:"2025-02-01",rd:"2025-02-01",sensory:"2025-04-01",outcome:"Pending", fk:"2025-05-13",stello:null,wc:null},
  {name:"Mac & Cheese",stage:"R&D bench",   idea:"2025-04-01",rd:"2025-04-01",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Pesto",       stage:"R&D bench",   idea:"2025-04-15",rd:"2025-04-15",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Nomato Cream",stage:"R&D bench",   idea:"2025-05-01",rd:"2025-05-01",sensory:null,outcome:"",fk:null,stello:null,wc:null},
  {name:"Ketchup",     stage:"R&D bench",   idea:"2025-05-01",rd:"2025-05-01",sensory:null,outcome:"",fk:null,stello:null,wc:null}
];

loadFromSheet();
</script>
</body>
</html>
